<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glow Touch Booking</title>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#ffe6f0;
  text-align:center;
  padding:40px;
}
.container{
  background:white;
  padding:30px;
  max-width:500px;
  margin:auto;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.1);
}
input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:#ff66a3;
  color:white;
  border:none;
  padding:15px;
  width:100%;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}
.status{font-weight:bold;margin:10px;color:#ff3399;}
.rules{
  background:#fff0f5;
  padding:30px;
  border-radius:20px;
  max-width:700px;
  margin:40px auto;
}
</style>
</head>

<body>
<div class="container">
<h1>🌸 Glow Touch Booking</h1>

<form id="bookingForm">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>

<label>Pick a Date 📅</label>
<input type="date" id="datePicker" required>
<div id="availability" class="status"></div>
<input type="text" id="timeSlot" readonly placeholder="Time slot will appear">

<select id="service" required>
<option value="">Select Service</option>
<option>Hair Care</option>
<option>Skincare</option>
<option>Makeup</option>
<option>Manicure/Pedicure</option>
<option>Massage</option>
<option>Nail Painting</option>
<option>Hairstyling</option>
<option>Glow Touch Premium</option>
</select>

<textarea id="notes" placeholder="Tell us your preferences 💖" required></textarea>

<label>
<input type="checkbox" id="agreeRules"> I agree to booking rules 💖
</label>

<button type="submit">Book Appointment 💌</button>
</form>
</div>

<script>
emailjs.init("aYulFPHFq_V9fhxKe");

const availableTimes={
0:["14:00 – 15:30"],
1:["17:30 – 19:00"],
2:[],
3:[],
4:["17:30 – 19:00"],
5:[],
6:["17:30 – 19:00"]
};

const datePicker=document.getElementById("datePicker");
const timeSlot=document.getElementById("timeSlot");
const availability=document.getElementById("availability");

datePicker.addEventListener("change",function(){
const selectedDate=new Date(this.value);
const today=new Date();
today.setHours(0,0,0,0);

const diffDays=(selectedDate-today)/(1000*60*60*24);
const day=selectedDate.getDay();
const slots=availableTimes[day];

if(diffDays<7){
availability.textContent="❌ Must book 1 week in advance!";
timeSlot.value="";
}
else if(!slots||slots.length===0){
availability.textContent="No appointments available 😢";
timeSlot.value="";
}
else{
availability.textContent="Available time: "+slots[0];
timeSlot.value=slots[0];
}
});

document.getElementById("bookingForm").addEventListener("submit",function(e){
e.preventDefault();

const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const date=document.getElementById("datePicker").value;
const service=document.getElementById("service").value;
const notes=document.getElementById("notes").value.trim();
const agreed=document.getElementById("agreeRules").checked;

/* EMAIL VALIDATION */
const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
const fakeEmails=["test@test.com","example@email.com","fake@mail.com","123@123.com"];

if(!emailRegex.test(email)){
alert("Enter a real email 💌");return;
}
if(fakeEmails.includes(email.toLowerCase())){
alert("Use your real email 💌");return;
}

/* NOTES VALIDATION */
const banned=["hi","hello","ok","test","none","no","n/a"];
if(notes.length<15){
alert("Write at least 15 characters in notes 💖");return;
}
if(banned.includes(notes.toLowerCase())){
alert("Write real preferences in notes 💖");return;
}

/* FINAL CHECK */
if(!name||!email||!date||!timeSlot.value||!service||!notes||!agreed){
alert("Complete all fields 🌸");return;
}

/* SEND TO GOOGLE SHEETS */
fetch("https://script.google.com/macros/s/AKfycbyxv6cQYjwhrjgIrpNLMQKT6ovg3fmKu2aTbk7BowUFBOHvTbuzmrlKPOxZrhHm7042/exec",{
  method:"POST",
  body:JSON.stringify({
    name:name,
    email:email,
    date:date,
    time:timeSlot.value,
    service:service,
    notes:notes
  })
})
.then(()=>{

  /* THEN SEND EMAIL */
  emailjs.send("service_h4xpaqh","template_tgosttk",{
    name,email,service,date,time:timeSlot.value,notes
  })
  .then(()=>{
    alert("Booking sent & saved! 🌸");
    document.getElementById("bookingForm").reset();
    availability.textContent="";
  })

})
.catch(()=>{
  alert("Error sending booking 😢");
});
fetch("https://script.google.com/macros/s/AKfycbyxv6cQYjwhrjgIrpNLMQKT6ovg3fmKu2aTbk7BowUFBOHvTbuzmrlKPOxZrhHm7042/exec",{
});
</script>
</body>
</html>
