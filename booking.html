<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Glow Touch Booking</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  font-family: Arial;
  background: #ffe6f0;
  text-align:center;
  padding:40px;
}
.container{
  background:white;
  padding:30px;
  max-width:500px;
  margin:auto;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.1);
}
input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:#ff66a3;
  color:white;
  border:none;
  padding:15px;
  width:100%;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}
.status{
  font-weight:bold;
  margin:10px;
}
</style>
</head>

<body>
<div class="container">
<h1>🌸 Glow Touch Booking</h1>

<form id="bookingForm">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>

<label>Pick a Date 📅</label>
<input type="date" id="datePicker" required>

<div id="availability" class="status"></div>

<input type="text" id="timeSlot" name="time" readonly placeholder="Time slot will appear">

<select name="service" required>
<option value="">Select Service</option>
<option>Hair Care</option>
<option>Skincare</option>
<option>Makeup</option>
<option>Manicure/Pedicure</option>
<option>Massage</option>
<option>Nail Painting</option>
<option>Hairstyling</option>
<option>Glow Touch Premium</option>
</select>

<textarea name="notes" placeholder="Tell us your vibe, preferences, soft music, environment etc 💖"></textarea>

<button type="submit">Book Appointment 💌</button>
</form>
</div>

<script>
emailjs.init("aYulFPHFq_V9fhxKe");

const datePicker = document.getElementById("datePicker");
const availability = document.getElementById("availability");
const timeSlot = document.getElementById("timeSlot");

datePicker.addEventListener("change", function() {
  const date = new Date(this.value);
  const day = date.getDay(); // 0 Sun - 6 Sat

  if(day === 2 || day === 5){
    availability.innerHTML = "❌ Closed this day";
    timeSlot.value="";
    return;
  }

  if(day === 0){
    availability.innerHTML = "✅ Available";
    timeSlot.value = "14:00 - 15:30";
  } else {
    availability.innerHTML = "✅ Available";
    timeSlot.value = "17:30 - 19:00";
  }
});

document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();

emailjs.sendForm("service_h4xpaqh","template_tgosttk",this)
.then(()=>{
alert("Booking sent! 🌸 Check email soon!");
this.reset();
availability.innerHTML="";
timeSlot.value="";
});
});
</script>

</body>
</html>
