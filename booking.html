<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Touch Booking</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(#ffe6f2,#ffd6ec);
  margin:0;
}

header{
  text-align:center;
  padding:40px;
  color:#ff4da6;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  color:#ff4da6;
}

label{
  display:block;
  margin-top:15px;
  font-weight:bold;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

button{
  margin-top:20px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  background:#ff4da6;
  color:white;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  background:#ff3399;
}

.note{
  background:#fff0f7;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h1>Glow Touch Booking 🌸</h1>
  <p>Choose your date & time slot</p>
</header>

<div class="container">

<div class="note">
<b>Booking Rules 💕</b><br>
• Book at least 1 week in advance<br>
• Each appointment = 1hr 30min slot<br>
• Tue / some Wed / Fri → CLOSED<br>
• Sun → only 2:00–3:30pm<br>
• Other days → 5:30–7:00pm<br>
• In notes tell me your vibe & preferences ✨
</div>

<form id="bookingForm">

<label>Your Name</label>
<input type="text" name="name" required>

<label>Your Email</label>
<input type="email" name="email" required>

<label>Select Service</label>
<select name="service" required>
<option>Glow Touch Premium 🌸</option>
<option>Skincare Service 💆‍♀️</option>
<option>Makeup 💄</option>
<option>Hair Care 💇‍♀️</option>
<option>Manicure/Pedicure 💅</option>
</select>

<label>Select Date</label>
<input type="date" id="datePicker" name="date" required>

<label>Select Time Slot</label>
<select id="timeSlot" name="time" required></select>

<label>Notes (Tell me your vibe & preferences 💖)</label>
<textarea name="notes" required></textarea>

<button type="submit">Reserve Appointment ✨</button>
</form>
</div>

<script>
(function(){
emailjs.init("aYulFPHFq_V9fhxKe");
})();

const dateInput = document.getElementById("datePicker");
const timeSlot = document.getElementById("timeSlot");

dateInput.addEventListener("change", function(){
  const date = new Date(this.value);
  const day = date.getDay();
  timeSlot.innerHTML = "";

  // Tuesday closed
  if(day === 2){
    timeSlot.innerHTML = "<option>Closed ❌</option>";
    return;
  }

  // Sunday only one slot
  if(day === 0){
    timeSlot.innerHTML = "<option>2:00 PM - 3:30 PM</option>";
    return;
  }

  // Other days slot
  timeSlot.innerHTML = "<option>5:30 PM - 7:00 PM</option>";
});

// submit email
document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();

emailjs.send("service_h4xpaqh","template_tgosttk",{
name:this.name.value,
email:this.email.value,
service:this.service.value,
date:this.date.value,
time:this.time.value,
notes:this.notes.value
})
.then(()=>{
alert("Booking sent! I'll check schedule and reply soon 💖");
this.reset();
},()=>{
alert("Oops something went wrong 😭");
});
});
</script>

</body>
</html>
